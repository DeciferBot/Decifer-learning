# Railway deployment config for the Decifer Learning content pipeline.
#
# Decifer Learning Phase 8A — Content Pipeline Activation Gate.
# Source of truth: CLAUDE.md §5 (Railway hosts the FastAPI pipeline),
# DECISIONS.md (Phase 8A entry).
#
# Required Railway environment variables (set in the Railway dashboard,
# NOT committed):
#
#   ANTHROPIC_API_KEY  — content generation, consensus, constitutional critique
#   OPENAI_API_KEY     — embeddings (optional; pipeline degrades gracefully if absent)
#   DATABASE_URL       — Supabase DIRECT Postgres connection (port 5432, NOT 6543).
#                        The pooled PgBouncer URL MUST NOT be used here: pipeline
#                        writes use multi-statement connections that PgBouncer
#                        transaction-mode will break. See DECISIONS.md.
#
# The Vercel app talks to this service via PIPELINE_SERVICE_URL set on Vercel
# to the public Railway URL (e.g. https://<service>.up.railway.app).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
